name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Accept SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Check project files
        run: |
          echo "=== Checking required files ==="
          ls -la
          echo "=== Checking buildozer.spec ==="
          cat buildozer.spec || echo "buildozer.spec not found!"

      - name: Build APK
        run: |
          yes | buildozer -v android debug

      - name: Debug build output
        run: |
          echo "=== Checking bin folder ==="
          ls -la ./bin/ || echo "bin folder not found"
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f
          echo "=== Checking .buildozer folder ==="
          ls -la .buildozer/ || echo ".buildozer not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk
          if-no-files-found: ignore