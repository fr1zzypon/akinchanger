name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and build APK
        run: |
          # Устанавливаем системные зависимости
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            autoconf libtool pkg-config build-essential

          # Устанавливаем Python пакеты
          pip install --upgrade pip
          pip install buildozer cython

          # Скачиваем и устанавливаем Android SDK
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          unzip commandlinetools-linux-11076708_latest.zip -d android-sdk/cmdline-tools
          mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest

          # Устанавливаем переменные для текущего shell
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH

          # Принимаем лицензии
          yes | sdkmanager --licenses || true

          # Устанавливаем SDK компоненты
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.1"
          sdkmanager "tools"

          # Запускаем сборку
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk